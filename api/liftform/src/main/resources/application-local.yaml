spring:
  application:
    name: liftform
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
app:
  cookie:
    secure: false

security:
  jwt:
    secret: mysecretkey

aws:
  region: us-east-1
  endpoint: http://localhost:4566
  s3:
    bucket: liftform-bucket