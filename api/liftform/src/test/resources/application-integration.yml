spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: integration-test-secret-key-that-is-long-enough

aws:
  region: us-east-1
  endpoint: http://localhost:4566  # overridden at runtime by DynamicPropertySource
  s3:
    bucket: test-bucket

app:
  cookie:
    secure: false

